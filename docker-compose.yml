services:
  backend-service-1:
    build:
      context: ./backend-service-1
    container_name: backend-service-1
    expose:
      - "8080"

  backend-service-2:
    build:
      context: ./backend-service-2
    container_name: backend-service-2
    expose:
      - "8080"

  proxy-service:
    build:
      context: ./proxy-service
    container_name: proxy-service
    ports:
      - "8080:8080"
    depends_on:
      - backend-service-1
      - backend-service-2

